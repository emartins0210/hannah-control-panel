<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Login - Fabíola Services</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login.carregando {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .erro-msg {
      display: none;
      background: #f8d7da;
      color: #721c24;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border: 1px solid #f5c6cb;
    }

    .erro-msg.ativo {
      display: block;
    }

    .demo-credentials {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 8px;
      margin-top: 30px;
      font-size: 12px;
      color: #555;
    }

    .demo-credentials strong {
      color: #667eea;
      display: block;
      margin-bottom: 8px;
    }

    .demo-item {
      margin-bottom: 8px;
      padding: 5px 0;
      font-family: 'Courier New', monospace;
    }

    .demo-item:last-child {
      margin-bottom: 0;
    }

    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="header">
      <div class="logo">🏠</div>
      <h1>Fabíola Services</h1>
      <p>Sistema de Agendamento de Limpeza</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="erro-msg" id="erroMsg"></div>

      <div class="form-group">
        <label for="email">📧 E-mail</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          placeholder="seu@email.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="senha">🔐 Senha</label>
        <input 
          type="password" 
          id="senha" 
          name="senha"
          placeholder="Digite sua senha"
          required
        >
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="color: #667eea; margin-top: 10px;">Conectando...</p>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        🚀 ACESSAR SISTEMA
      </button>
    </form>

    <div class="demo-credentials">
      <strong>📝 Credenciais de Demonstração:</strong>
      <div class="demo-item">
        <strong style="color: #764ba2;">Admin (Vê Tudo):</strong><br>
        Email: fabiola@lopeservices.com<br>
        Senha: admin123456
      </div>
      <div class="demo-item">
        <strong style="color: #764ba2;">Cliente (Vê Seu Dados):</strong><br>
        Email: contact@aventine.com<br>
        Senha: aventine123
      </div>
    </div>

    <div class="footer">
      <p>🔒 Sua conexão é segura e criptografada</p>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;

    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const erroMsg = document.getElementById('erroMsg');
      const loading = document.getElementById('loading');
      const btnLogin = document.getElementById('btnLogin');

      // Limpar erro
      erroMsg.textContent = '';
      erroMsg.classList.remove('ativo');

      // Mostrar loading
      loading.style.display = 'block';
      btnLogin.disabled = true;
      btnLogin.classList.add('carregando');

      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, senha })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.erro || 'Erro ao fazer login');
        }

        // Armazenar token
        localStorage.setItem('token', data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));

        // Redirecionar baseado no tipo
        if (data.usuario.tipo === 'admin') {
          window.location.href = '/painel-admin.html';
        } else {
          window.location.href = '/painel-cliente.html';
        }

      } catch (erro) {
        erroMsg.textContent = `❌ ${erro.message}`;
        erroMsg.classList.add('ativo');
        console.error('Erro:', erro);
      } finally {
        loading.style.display = 'none';
        btnLogin.disabled = false;
        btnLogin.classList.remove('carregando');
      }
    }

    // Verificar se já está logado
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      const usuario = localStorage.getItem('usuario');

      if (token && usuario) {
        const user = JSON.parse(usuario);
        if (user.tipo === 'admin') {
          window.location.href = '/painel-admin.html';
        } else {
          window.location.href = '/painel-cliente.html';
        }
      }
    });
  </script>
</body>
</html>
